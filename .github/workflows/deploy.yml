
name: CI/CD Deploy to AWS ECS

on:
  push:
    branches: [main]

env:
  AWS_REGION: ap-east-1
  ECR_BACKEND: 889351697031.dkr.ecr.ap-east-1.amazonaws.com/mshk-codetogive2025/eventmanagement-backend
  ECR_FRONTEND: 889351697031.dkr.ecr.ap-east-1.amazonaws.com/mshk-codetogive2025/eventmanagement-frontend
  ECS_CLUSTER: zubin-eventmanagement-cluster
  ECS_SERVICE_BACKEND: zubin-eventmanagement-backend-service
  ECS_SERVICE_FRONTEND: zubin-eventmanagement-frontend-service

jobs:
  build-and-deploy-backend:
    name: Build & Deploy Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push backend image to ECR
        run: |
          docker build --platform linux/amd64 -t $ECR_BACKEND ./backend
          docker tag $ECR_BACKEND:latest $ECR_BACKEND:latest
          docker push $ECR_BACKEND:latest

      - name: Update ECS task definition with Twilio template SIDs
        id: taskdef
        env:
          TWILIO_WHATSAPP_TEMPLATE_SID: ${{ secrets.TWILIO_WHATSAPP_TEMPLATE_SID }}
          TWILIO_WHATSAPP_MARKETING_TEMPLATE_SID: ${{ secrets.TWILIO_WHATSAPP_MARKETING_TEMPLATE_SID }}
          TWILIO_WHATSAPP_EVENT_UPDATE_TEMPLATE_SID: ${{ secrets.TWILIO_WHATSAPP_EVENT_UPDATE_TEMPLATE_SID }}
        run: |
          TASK_DEF=$(aws ecs describe-services --cluster $ECS_CLUSTER --services $ECS_SERVICE_BACKEND --query 'services[0].taskDefinition' --output text)
          aws ecs describe-task-definition --task-definition "$TASK_DEF" --query 'taskDefinition' > current.json
          jq 'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .placementConstraints, .compatibilities, .registeredAt, .registeredBy)' current.json > clean.json
          jq --arg t "${TWILIO_WHATSAPP_TEMPLATE_SID}" --arg m "${TWILIO_WHATSAPP_MARKETING_TEMPLATE_SID}" --arg e "${TWILIO_WHATSAPP_EVENT_UPDATE_TEMPLATE_SID}" \
            '.containerDefinitions[0].environment = ((.containerDefinitions[0].environment // []) | map(select(.name != "TWILIO_WHATSAPP_TEMPLATE_SID" and .name != "TWILIO_WHATSAPP_MARKETING_TEMPLATE_SID" and .name != "TWILIO_WHATSAPP_EVENT_UPDATE_TEMPLATE_SID"))) + [{"name":"TWILIO_WHATSAPP_TEMPLATE_SID","value":$t},{"name":"TWILIO_WHATSAPP_MARKETING_TEMPLATE_SID","value":$m},{"name":"TWILIO_WHATSAPP_EVENT_UPDATE_TEMPLATE_SID","value":$e}]' \
            clean.json > new.json
          NEW_ARN=$(aws ecs register-task-definition --cli-input-json file://new.json --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "task_def_arn=$NEW_ARN" >> $GITHUB_OUTPUT

      - name: Update ECS backend service
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE_BACKEND \
            --task-definition ${{ steps.taskdef.outputs.task_def_arn }} \
            --force-new-deployment

  build-and-deploy-frontend:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push frontend image to ECR
        run: |
          docker build --platform linux/amd64 --build-arg VITE_API_URL=https://api.events.opportunitybankhk.org/api -t $ECR_FRONTEND ./frontend
          docker tag $ECR_FRONTEND:latest $ECR_FRONTEND:latest
          docker push $ECR_FRONTEND:latest

      - name: Update ECS frontend service
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE_FRONTEND \
            --force-new-deployment