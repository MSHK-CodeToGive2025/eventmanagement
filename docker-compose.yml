# Local full stack for Docker Desktop (MongoDB + Backend + Frontend)
# Usage: docker compose up --build
# Then open http://localhost:3000 and log in; backend API at http://localhost:3001

services:
  mongodb:
    image: mongo:7
    ports:
      - "27018:27017"   # host 27018 to avoid conflict with local MongoDB on 27017
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - PORT=3001
      # Use local MongoDB when running full stack in Docker (override .env if present)
      - MONGODB_URI=mongodb://mongodb:27017/zubin-foundation
    depends_on:
      - mongodb
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Browser runs on host; API calls go to host:3001
        VITE_API_URL: http://localhost:3001/api
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongodb_data:
